<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>data-rag | Datasets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a28;
            --bg-card: #16161f;
            --border: #2a2a3d;
            --border-hover: #3a3a55;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --accent: #7c5cfc;
            --accent-hover: #9179ff;
            --accent-glow: rgba(124, 92, 252, 0.15);
            --accent-soft: rgba(124, 92, 252, 0.08);
            --user-bg: linear-gradient(135deg, #7c5cfc 0%, #5a3de8 100%);
            --success: #34d399;
            --error: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--user-bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
        }

        .logo span:last-child {
            color: var(--text-secondary);
            font-weight: 500;
            margin-left: 4px;
        }

        .header-btn {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        /* ── Container ── */
        .container { max-width: 860px; margin: 32px auto; padding: 0 24px; }

        /* ── Upload area ── */
        .upload-card {
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 32px;
            transition: all 0.25s;
            cursor: pointer;
        }

        .upload-card:hover {
            border-color: var(--border-hover);
        }

        .upload-card.dragover {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .upload-icon {
            width: 56px;
            height: 56px;
            background: var(--accent-soft);
            border: 1px solid rgba(124, 92, 252, 0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .upload-card h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .upload-card p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .upload-card input[type="file"] { display: none; }

        .upload-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: var(--user-bg);
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            transition: opacity 0.2s;
        }

        .upload-label:hover { opacity: 0.9; }

        .upload-fields {
            display: none;
            margin-top: 20px;
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .upload-fields.visible { display: block; animation: slideDown 0.2s ease-out; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-fields input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .upload-fields input[type="text"]:focus { border-color: var(--accent); }
        .upload-fields input[type="text"]::placeholder { color: var(--text-muted); }

        .file-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--accent-soft);
            border: 1px solid rgba(124, 92, 252, 0.15);
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
        }

        .upload-submit {
            width: 100%;
            padding: 12px;
            background: var(--user-bg);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .upload-submit:hover { opacity: 0.9; }
        .upload-submit:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Section title ── */
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Dataset cards ── */
        .dataset-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .dataset-card:hover { border-color: var(--border-hover); }

        .ds-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .ds-info h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .ds-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .ds-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ds-description {
            margin-top: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .ds-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .ds-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .ds-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .ds-btn.delete {
            border-color: rgba(248, 113, 113, 0.2);
            color: var(--error);
        }

        .ds-btn.delete:hover {
            background: rgba(248, 113, 113, 0.08);
            border-color: rgba(248, 113, 113, 0.3);
        }

        /* ── Schema table ── */
        .schema-section {
            margin-top: 12px;
            display: none;
        }

        .schema-section.visible { display: block; animation: slideDown 0.2s ease-out; }

        .schema-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12.5px;
            font-family: 'JetBrains Mono', monospace;
        }

        .schema-table th {
            text-align: left;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            color: var(--accent);
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        .schema-table td {
            padding: 7px 12px;
            border-bottom: 1px solid rgba(42, 42, 61, 0.4);
            color: var(--text-primary);
        }

        .schema-table tr:last-child td { border-bottom: none; }

        .type-badge {
            display: inline-block;
            padding: 2px 8px;
            background: var(--accent-soft);
            border-radius: 4px;
            font-size: 11px;
            color: var(--accent);
        }

        /* ── Empty & Toast ── */
        .empty-datasets {
            text-align: center;
            color: var(--text-muted);
            padding: 48px;
            font-size: 14px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            display: none;
            z-index: 100;
            animation: slideUp 0.3s ease-out;
        }

        .toast.error {
            border-color: rgba(248, 113, 113, 0.3);
            color: var(--error);
        }

        .toast.success {
            border-color: rgba(52, 211, 153, 0.3);
            color: var(--success);
        }

        .toast.visible { display: flex; align-items: center; gap: 8px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">d</div>
            data-rag<span>Datasets</span>
        </div>
        <a href="/" class="header-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Back to Chat
        </a>
    </header>

    <div class="container">
        <div class="upload-card" id="upload-area">
            <div class="upload-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <h2>Upload a dataset</h2>
            <p>Drag & drop a CSV or Excel file, or click to browse</p>
            <label class="upload-label" for="file-input">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Choose file
            </label>
            <input type="file" id="file-input" accept=".csv,.tsv,.xlsx,.xls">

            <div class="upload-fields" id="upload-fields">
                <div class="file-info" id="file-info"></div>
                <input type="text" id="ds-name" placeholder="Dataset name (optional)">
                <input type="text" id="ds-description" placeholder="Description (optional)">
                <button class="upload-submit" onclick="uploadFile()" id="upload-btn">Upload dataset</button>
            </div>
        </div>

        <div class="section-title">Uploaded datasets</div>
        <div id="datasets-list"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const uploadFields = document.getElementById('upload-fields');
        const fileInfo = document.getElementById('file-info');
        const datasetsList = document.getElementById('datasets-list');
        const toast = document.getElementById('toast');

        let selectedFile = null;

        uploadArea.addEventListener('dragover', e => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) selectFile(fileInput.files[0]);
        });

        function selectFile(file) {
            selectedFile = file;
            const sizeFmt = file.size > 1024*1024
                ? (file.size / (1024*1024)).toFixed(1) + ' MB'
                : (file.size / 1024).toFixed(1) + ' KB';
            fileInfo.textContent = `${file.name} (${sizeFmt})`;
            uploadFields.classList.add('visible');
        }

        async function uploadFile() {
            if (!selectedFile) return;
            const btn = document.getElementById('upload-btn');
            btn.disabled = true;
            btn.textContent = 'Uploading...';

            const formData = new FormData();
            formData.append('file', selectedFile);
            const name = document.getElementById('ds-name').value;
            const desc = document.getElementById('ds-description').value;
            if (name) formData.append('name', name);
            if (desc) formData.append('description', desc);

            try {
                const resp = await fetch('/datasets', { method: 'POST', body: formData });
                if (!resp.ok) {
                    const err = await resp.json();
                    showToast(err.message || 'Upload failed', 'error');
                    return;
                }
                showToast('Dataset uploaded successfully', 'success');
                selectedFile = null;
                uploadFields.classList.remove('visible');
                fileInput.value = '';
                document.getElementById('ds-name').value = '';
                document.getElementById('ds-description').value = '';
                loadDatasets();
            } catch (e) {
                showToast('Upload failed: connection error', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Upload dataset';
            }
        }

        async function loadDatasets() {
            try {
                const resp = await fetch('/datasets');
                const data = await resp.json();
                if (!data.datasets.length) {
                    datasetsList.innerHTML = '<div class="empty-datasets">No datasets uploaded yet.</div>';
                    return;
                }
                datasetsList.innerHTML = data.datasets.map(renderDataset).join('');
            } catch (e) {
                datasetsList.innerHTML = '<div class="empty-datasets">Failed to load datasets.</div>';
            }
        }

        function renderDataset(ds) {
            const date = new Date(ds.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const size = ds.file_size_bytes
                ? ds.file_size_bytes > 1024*1024
                    ? (ds.file_size_bytes / (1024*1024)).toFixed(1) + ' MB'
                    : (ds.file_size_bytes / 1024).toFixed(1) + ' KB'
                : '';

            const schemaId = 'schema-' + ds.id;
            const schemaRows = ds.schema_info.map(col =>
                `<tr>
                    <td>${esc(col.column)}</td>
                    <td><span class="type-badge">${esc(col.type)}</span></td>
                    <td style="color:var(--text-secondary)">${esc((col.sample || []).slice(0, 3).join(', '))}</td>
                </tr>`
            ).join('');

            return `
                <div class="dataset-card">
                    <div class="ds-header">
                        <div class="ds-info">
                            <h3>${esc(ds.name)}</h3>
                            <div class="ds-meta">
                                <span>${(ds.row_count || 0).toLocaleString()} rows</span>
                                <span>${size}</span>
                                <span>${date}</span>
                            </div>
                            ${ds.description ? `<div class="ds-description">${esc(ds.description)}</div>` : ''}
                        </div>
                        <div class="ds-actions">
                            <button class="ds-btn" onclick="toggleSchema('${schemaId}', this)">Schema</button>
                            <button class="ds-btn delete" onclick="deleteDataset('${ds.id}')">Delete</button>
                        </div>
                    </div>
                    <div class="schema-section" id="${schemaId}">
                        <table class="schema-table">
                            <thead><tr><th>Column</th><th>Type</th><th>Sample values</th></tr></thead>
                            <tbody>${schemaRows}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function toggleSchema(id, btn) {
            const el = document.getElementById(id);
            el.classList.toggle('visible');
        }

        async function deleteDataset(id) {
            if (!confirm('Delete this dataset? This cannot be undone.')) return;
            try {
                const resp = await fetch(`/datasets/${id}`, { method: 'DELETE' });
                if (resp.ok) {
                    showToast('Dataset deleted', 'success');
                    loadDatasets();
                } else {
                    showToast('Delete failed', 'error');
                }
            } catch (e) {
                showToast('Delete failed', 'error');
            }
        }

        function showToast(msg, type) {
            toast.textContent = msg;
            toast.className = `toast visible ${type || ''}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function esc(text) {
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        loadDatasets();
    </script>
</body>
</html>
