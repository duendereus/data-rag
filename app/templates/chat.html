<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>data-rag | Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1a1a2e;
            color: #fff;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 18px; font-weight: 600; }
        header a { color: #94a3b8; text-decoration: none; font-size: 14px; }
        header a:hover { color: #fff; }
        .toolbar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .toolbar input {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
        .toolbar button {
            padding: 8px 16px;
            background: #e2e8f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .toolbar button:hover { background: #cbd5e1; }
        .toolbar .label { font-size: 13px; color: #6b7280; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 90%;
            line-height: 1.5;
        }
        .message.user {
            background: #1a1a2e;
            color: #fff;
            margin-left: auto;
        }
        .message.assistant {
            background: #fff;
            border: 1px solid #e2e8f0;
        }
        .message .answer { margin-bottom: 8px; }
        .message details {
            margin-top: 8px;
            font-size: 13px;
        }
        .message details summary {
            cursor: pointer;
            color: #6366f1;
            font-weight: 500;
        }
        .message pre {
            background: #f1f5f9;
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 4px;
        }
        .input-area {
            background: #fff;
            border-top: 1px solid #e2e8f0;
            padding: 16px 24px;
        }
        .input-area form {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .input-area input:focus { border-color: #6366f1; }
        .input-area button {
            padding: 12px 24px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        .input-area button:hover { background: #4f46e5; }
        .input-area button:disabled { background: #94a3b8; cursor: not-allowed; }
        .empty-state {
            text-align: center;
            color: #94a3b8;
            margin-top: 100px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header>
        <h1>data-rag</h1>
        <a href="/panel">Admin Panel</a>
    </header>

    <div class="toolbar">
        <span class="label">Locale:</span>
        <input type="text" id="locale-input" value="es" placeholder="Locale" style="width:60px;">
        <button onclick="newConversation()">New conversation</button>
    </div>

    <div class="chat-container" id="chat">
        <div class="empty-state" id="empty-state">
            Ask a question about any of your uploaded datasets.
        </div>
    </div>

    <div class="input-area">
        <form onsubmit="sendQuestion(event)">
            <input type="text" id="question-input" placeholder="Ask a question about your data..." autocomplete="off">
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>

    <script>
        const questionInput = document.getElementById('question-input');
        const chatContainer = document.getElementById('chat');
        const emptyState = document.getElementById('empty-state');
        const sendBtn = document.getElementById('send-btn');
        const localeInput = document.getElementById('locale-input');

        let conversationId = localStorage.getItem('data-rag-conversation-id') || null;

        function addMessage(role, content) {
            emptyState.style.display = 'none';
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendQuestion(e) {
            e.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;

            addMessage('user', escapeHtml(question));
            questionInput.value = '';
            sendBtn.disabled = true;

            try {
                const body = {
                    question,
                    locale: localeInput.value || 'en',
                    include_sql: true
                };
                if (conversationId) {
                    body.conversation_id = conversationId;
                }

                const resp = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    addMessage('assistant', `<div class="answer" style="color:#ef4444;">Error: ${escapeHtml(err.message || 'Query failed')}</div>`);
                    return;
                }

                const data = await resp.json();

                // Save conversation ID for continuity
                conversationId = data.conversation_id;
                localStorage.setItem('data-rag-conversation-id', conversationId);

                let html = `<div class="answer">${escapeHtml(data.answer)}</div>`;
                if (data.sql) {
                    html += `<details><summary>View SQL</summary><pre>${escapeHtml(data.sql)}</pre></details>`;
                }
                if (data.result && data.result.length > 0) {
                    html += `<details><summary>View results (${data.result.length} rows)</summary><pre>${escapeHtml(JSON.stringify(data.result, null, 2))}</pre></details>`;
                }
                addMessage('assistant', html);
            } catch (e) {
                addMessage('assistant', `<div class="answer" style="color:#ef4444;">Connection error</div>`);
            } finally {
                sendBtn.disabled = false;
                questionInput.focus();
            }
        }

        function newConversation() {
            conversationId = null;
            localStorage.removeItem('data-rag-conversation-id');
            chatContainer.innerHTML = '';
            emptyState.style.display = 'block';
            chatContainer.appendChild(emptyState);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
