services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

volumes:
  redis_data:
